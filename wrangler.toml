# Cloudflare Workers — XPElevator
# Deployed via @opennextjs/cloudflare (Workers format, v1.x)
# Docs: https://opennext.js.org/cloudflare/get-started

name = "xpelevator"
compatibility_date = "2025-01-01"

# nodejs_compat is required for Neon serverless driver
# global_fetch_strictly_public is required by OpenNext CF 1.x
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

# Cloudflare Pages build output directory (advanced mode). We deploy the generated
# assets folder so static files are at the root (/_next/...), and include _worker.js
# inside that folder.
pages_build_output_dir = ".open-next/assets"

# Static assets are served by Pages; ASSETS binding is provided automatically

[vars]
PRISMA_CLIENT_ENGINE_TYPE = "wasm"
DISABLE_AUTH = "true"

# ── Environment variables ────────────────────────────────────────────────────
# Set these via `wrangler secret put DATABASE_URL` / `wrangler secret put GROQ_API_KEY`
# or in the Cloudflare Workers dashboard (Settings → Variables and Secrets)
#
# Do NOT hard-code secrets here. The keys below are placeholders for reference only.
#
# [vars]
# DATABASE_URL = "postgresql://..."   # Neon connection string
# GROQ_API_KEY = "gsk_..."            # Groq API key

# ── Preview environment ──────────────────────────────────────────────────────
[env.preview]
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]
[env.preview.vars]
PRISMA_CLIENT_ENGINE_TYPE = "wasm"
DISABLE_AUTH = "true"
