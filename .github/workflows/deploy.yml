name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy
    
    env:
      # Real secrets injected at build time so env.ts validation passes.
      # At RUNTIME the CF Worker reads these from Pages bindings via
      # getCloudflareContext().env — NOT from process.env — so the built
      # bundle never has stale/dummy values baked in for runtime use.
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build with OpenNext
        run: npx @opennextjs/cloudflare build

      - name: Bundle worker
        run: node scripts/bundle-worker.js

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .open-next/assets --project-name=xpelevator

      - name: Set production secrets
        run: |
          echo "${{ secrets.GROQ_API_KEY }}" | npx wrangler pages secret put GROQ_API_KEY --project-name=xpelevator
          echo "${{ secrets.DATABASE_URL }}" | npx wrangler pages secret put DATABASE_URL --project-name=xpelevator
          echo "${{ secrets.AUTH_SECRET }}" | npx wrangler pages secret put AUTH_SECRET --project-name=xpelevator
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
